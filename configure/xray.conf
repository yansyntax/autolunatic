# =================================================================
# NGINX XRAY CONFIG — /etc/nginx/conf.d/xray.conf
#
# SERVER BLOCK 1: Port 8001 (HTTP internal)
#   Menerima traffic dari HAProxy untuk port 80/8080/8880/2082
#   Protokol: SSH-WS, VMess-WS, VLess-WS, Trojan-WS
#
# SERVER BLOCK 2: Port 8002 (HTTPS internal)
#   Menerima traffic dari HAProxy untuk port 443/8443/2083
#   Protokol: VMess-TLS/gRPC, VLess-TLS/gRPC/XHTTP, Trojan-TLS/gRPC, SSH-TLS
# =================================================================


# -----------------------------------------------------------------
# BLOCK 1: HTTP Internal — Port 8001
# Untuk WebSocket dari port HTTP (80, 8080, 8880, 2082)
# -----------------------------------------------------------------
server {
    listen 8001;
    server_name _;

    # VLess WebSocket
    location /vless {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # VMess WebSocket
    location /vmess {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Trojan WebSocket
    location /trojan-ws {
        proxy_pass http://127.0.0.1:10003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSH via WebSocket (ws.py proxy)
    location /ssh {
        proxy_pass http://127.0.0.1:10015;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Fake Web (Stealth)
    location / {
        root /var/www/html;
        index index.html;
    }
}


# -----------------------------------------------------------------
# BLOCK 2: HTTPS Internal — Port 8002
# Untuk TLS/SSL dari port 443/8443/2083
# Nginx yang handle SSL termination
# -----------------------------------------------------------------
server {
    listen 8002 ssl http2;
    server_name _;

    ssl_certificate     /etc/xray/xray.crt;
    ssl_certificate_key /etc/xray/xray.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # =================== WebSocket TLS ===================

    # VLess WebSocket + TLS
    location /vless {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # VMess WebSocket + TLS
    location /vmess {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Trojan WebSocket + TLS
    location /trojan-ws {
        proxy_pass http://127.0.0.1:10003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SSH via WebSocket + TLS
    location /ssh {
        proxy_pass http://127.0.0.1:10015;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # =================== XHTTP (VLess) ===================
    location /xhttp {
        proxy_pass http://127.0.0.1:10009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # =================== gRPC ===================

    # VLess gRPC
    location /vless-grpc {
        grpc_pass grpc://127.0.0.1:10005;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
    }

    # VMess gRPC
    location /vmess-grpc {
        grpc_pass grpc://127.0.0.1:10006;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
    }

    # Trojan gRPC
    location /trojan-grpc {
        grpc_pass grpc://127.0.0.1:10007;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
    }

    # Fake Web (Stealth)
    location / {
        root /var/www/html;
        index index.html;
    }
}
